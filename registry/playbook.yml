---
- name: Déploiement du registry Docker sécurisé avec HTTPS
  hosts: registry_hosts
  become: true
  vars:
    project_dir: '/home/ubuntu/registry-stack'
    nginx_conf_path: "{{ project_dir }}/nginx/nginx.conf"
    cert_path: "{{ project_dir }}/nginx/certs"
    public_ip: "{{ ansible_host }}"

  tasks:

    - name: Mise à jour du cache APT
      apt:
        update_cache: yes

    - name: Installation des paquets Docker et utilitaires
      apt:
        name:
          - docker.io
          - docker-compose-v2
          - apache2-utils
          - openssl
        state: present

    - name: Ajout de l'utilisateur ubuntu au groupe docker
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Création des dossiers pour la stack
      file:
        path: "{{ item }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'
      loop:
          - "{{ project_dir }}"
          - "{{ project_dir }}/auth"
          - "{{ project_dir }}/data"
          - "{{ project_dir }}/nginx"
          - "{{ cert_path }}"

    - name: Installer passlib sur l'hôte distant
      apt:
        name: python3-passlib
        state: present

    - name: Génération mot de passe (admin/admin123)
      htpasswd:
        path: "{{ project_dir }}/auth/registry.password"
        name: "{{ registry_user }}"
        password: "{{ registry_password }}"
        owner: ubuntu
        group: ubuntu
        mode: 0640

    - name: Génération certificat SSL auto-signé
      command: >
        openssl req -x509 -nodes -days 365
        -newkey rsa:2048
        -keyout {{ cert_path }}/registry.key
        -out {{ cert_path }}/registry.crt
        -subj "/CN={{ public_ip }}"
      args:
        creates: "{{ cert_path }}/registry.crt"

    - name: Déploiement du fichier nginx.conf
      template:
        src: nginx.conf.j2
        dest: "{{ nginx_conf_path }}"
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Copie du docker-compose.yml adapté pour HTTPS
      template:
        src: docker-compose.yml
        dest: "{{ project_dir }}/docker-compose.yml"
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Démarrage de la stack Docker
      command: docker compose up -d
      args:
        chdir: "{{ project_dir }}"
